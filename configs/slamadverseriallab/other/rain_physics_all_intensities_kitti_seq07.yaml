experiment:
  name: rain_all_intensities_kitti_03
  description: "Compare light, medium, and heavy rain on KITTI sequence 03"
  seed: 42

dataset:
  type: kitti
  sequence: "03"
  skip_depth: true
  load_stereo: true

perturbations:
  - name: light_rain
    type: rain
    enabled: true
    parameters:
      intensity: 3
      depth_model: vitb
      max_depth: 80
      rain_rendering_path: ./deps/perturbations/rain-rendering

  - name: medium_rain
    type: rain
    enabled: true
    parameters:
      intensity: 10
      depth_model: vitb
      max_depth: 80
      rain_rendering_path: ./deps/perturbations/rain-rendering

  - name: heavy_rain
    type: rain
    enabled: true
    parameters:
      intensity: 100
      depth_model: vitb
      max_depth: 80
      rain_rendering_path: ./deps/perturbations/rain-rendering

output:
  base_dir: ./results
  save_images: true
  create_timestamp_dir: false
  kitti_native_format: true

