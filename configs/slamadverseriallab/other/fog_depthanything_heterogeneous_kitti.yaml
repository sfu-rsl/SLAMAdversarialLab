experiment:
  name: fog_heterogeneous_kitti_04
  description: "Heterogeneous fog with 3D noise (fog_codes_public style) on KITTI sequence 04"
  seed: 42

dataset:
  type: kitti
  sequence: "04"
  skip_depth: true
  load_stereo: true

perturbations:
  - name: heterogeneous_fog
    type: fog
    enabled: true
    parameters:
      visibility_m: 40.0
      atmospheric_light: [0.98, 0.98, 1.0]

      min_depth_m: 0.1
      max_depth_m: 80.0

      encoder: vitl
      input_size: 518
      max_depth_range: 150.0

      add_noise: true
      noise_scale: 0.5
      noise_steps: 10

      focal_length_px: 707.0912
      principal_point: [601.8873, 183.1104]

output:
  base_dir: ./results
  save_images: true
  create_timestamp_dir: false
  kitti_native_format: true

