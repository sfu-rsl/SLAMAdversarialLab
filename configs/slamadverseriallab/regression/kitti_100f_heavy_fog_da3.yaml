experiment:
  name: regression_kitti04_heavy_fog_da3_100f
  description: "100-frame heavy fog regression on KITTI seq04 with DA3-generated depth"
  seed: 42

dataset:
  type: kitti
  path: ./datasets/kitti/sequences/04
  sequence: "04"
  max_frames: 100
  load_stereo: false
  skip_depth: true

perturbations:
  - name: fog_heavy_da3
    type: fog
    enabled: true
    parameters:
      visibility_m: 20
      max_depth_range: 80.0

output:
  base_dir: ./results/regression
  save_images: true
  create_timestamp_dir: false
