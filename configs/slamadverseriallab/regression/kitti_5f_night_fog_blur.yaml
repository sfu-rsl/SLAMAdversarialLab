experiment:
  name: regression_kitti_5f_night_fog_blur
  description: "Regression check on KITTI with composite night, fog, and speed blur"
  seed: 42

dataset:
  type: kitti
  path: ./datasets/kitti/sequences/04
  sequence: "04"
  max_frames: 5
  load_stereo: false
  skip_depth: true

perturbations:
  - name: night_fog_blur
    type: composite
    enabled: true
    parameters:
      mode: sequential
      modules:
        - name: night
          type: daynight
          parameters:
            direction: day_to_night
            enable_fp16: true
        - name: fog
          type: fog
          parameters:
            visibility_m: 50
            encoder: vitb
            max_depth_range: 80.0
        - name: blur
          type: speed_blur
          parameters:
            speed: 80
            exposure_time: 0.03
            max_blur_px: 120.0

output:
  base_dir: ./results/regression
  save_images: true
  create_timestamp_dir: false
