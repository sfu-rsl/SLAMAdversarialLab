experiment:
  name: kitti_rain_soiling_experiments
  description: "Rain + Soiling composite at all severity levels on KITTI seq 07"
  seed: 42

dataset:
  type: kitti
  sequence: "07"
  max_frames: 200
  skip_depth: true
  load_stereo: true

perturbations:
  - name: rain_soiling_light
    type: composite
    enabled: true
    parameters:
      mode: sequential
      modules:
        - name: rain
          type: rain
          parameters:
            intensity: 3
            depth_model: vitb
            max_depth: 80
        - name: soiling
          type: lens_soiling
          parameters:
            num_particles: 15
            size_range: [20, 40]

  - name: rain_soiling_moderate
    type: composite
    enabled: true
    parameters:
      mode: sequential
      modules:
        - name: rain
          type: rain
          parameters:
            intensity: 10
            depth_model: vitb
            max_depth: 80
        - name: soiling
          type: lens_soiling
          parameters:
            num_particles: 40
            size_range: [20, 40]

  - name: rain_soiling_heavy
    type: composite
    enabled: true
    parameters:
      mode: sequential
      modules:
        - name: rain
          type: rain
          parameters:
            intensity: 50
            depth_model: vitb
            max_depth: 80
        - name: soiling
          type: lens_soiling
          parameters:
            num_particles: 80
            size_range: [20, 40]

  - name: rain_soiling_severe
    type: composite
    enabled: true
    parameters:
      mode: sequential
      modules:
        - name: rain
          type: rain
          parameters:
            intensity: 200
            depth_model: vitb
            max_depth: 80
        - name: soiling
          type: lens_soiling
          parameters:
            num_particles: 150
            size_range: [20, 40]

output:
  base_dir: ./results/experiments
  save_images: true
  create_timestamp_dir: false
  kitti_native_format: true
