experiment:
  name: tum_crack_experiments
  description: "Cracked lens at all severity levels on TUM fr1_desk2"
  seed: 42

dataset:
  type: tum
  sequence: "freiburg1_xyz"
  skip_depth: true
  load_stereo: false

perturbations:
  - name: crack_light
    type: cracked_lens
    enabled: true
    parameters:
      impact_force: 300
      break_threshold: 400

  - name: crack_moderate
    type: cracked_lens
    enabled: true
    parameters:
      impact_force: 400
      break_threshold: 350

  - name: crack_heavy
    type: cracked_lens
    enabled: true
    parameters:
      impact_force: 500
      break_threshold: 300

  - name: crack_severe
    type: cracked_lens
    enabled: true
    parameters:
      impact_force: 600
      break_threshold: 250

output:
  base_dir: ./results/experiments
  save_images: true
  create_timestamp_dir: false
  tum_native_format: true
